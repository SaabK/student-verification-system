<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>3D Economic Simulation</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
                background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
                overflow: hidden;
                color: white;
            }

            #container {
                width: 100vw;
                height: 100vh;
                position: relative;
            }

            #info-panel {
                position: absolute;
                top: 20px;
                left: 20px;
                background: rgba(0, 0, 0, 0.75);
                backdrop-filter: blur(15px);
                padding: 25px;
                border-radius: 20px;
                z-index: 100;
                min-width: 320px;
                box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
                border: 1px solid rgba(255, 255, 255, 0.1);
            }

            #info-panel h2 {
                margin-bottom: 20px;
                font-size: 26px;
                color: #fff;
                text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
                font-weight: 600;
            }

            .metric {
                margin: 15px 0;
                padding: 12px;
                background: rgba(255, 255, 255, 0.05);
                border-radius: 10px;
                border-left: 3px solid;
            }

            .metric-label {
                font-size: 13px;
                opacity: 0.8;
                margin-bottom: 5px;
                text-transform: uppercase;
                letter-spacing: 1px;
            }

            .metric-value {
                font-size: 28px;
                font-weight: bold;
                text-shadow: 0 2px 10px currentColor;
            }

            #wealth-chart {
                margin-top: 20px;
                height: 150px;
                position: relative;
                background: rgba(255, 255, 255, 0.05);
                border-radius: 10px;
                padding: 10px;
            }

            #stats-panel {
                position: absolute;
                top: 20px;
                right: 20px;
                background: rgba(0, 0, 0, 0.75);
                backdrop-filter: blur(15px);
                padding: 25px;
                border-radius: 20px;
                z-index: 100;
                min-width: 280px;
                box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
                border: 1px solid rgba(255, 255, 255, 0.1);
            }

            .stat-item {
                display: flex;
                justify-content: space-between;
                margin: 12px 0;
                font-size: 15px;
                padding: 8px;
                background: rgba(255, 255, 255, 0.05);
                border-radius: 8px;
            }

            .stat-label {
                opacity: 0.9;
            }

            .stat-value {
                font-weight: bold;
                color: #4ade80;
            }

            #controls {
                position: absolute;
                bottom: 20px;
                left: 50%;
                transform: translateX(-50%);
                background: rgba(0, 0, 0, 0.75);
                backdrop-filter: blur(15px);
                padding: 20px 30px;
                border-radius: 20px;
                z-index: 100;
                display: flex;
                gap: 15px;
                box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
                border: 1px solid rgba(255, 255, 255, 0.1);
            }

            button {
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                border: none;
                color: white;
                padding: 14px 28px;
                border-radius: 12px;
                cursor: pointer;
                font-size: 15px;
                font-weight: 600;
                transition: all 0.3s ease;
                box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4);
                border: 1px solid rgba(255, 255, 255, 0.2);
            }

            button:hover {
                transform: translateY(-3px);
                box-shadow: 0 6px 25px rgba(102, 126, 234, 0.6);
            }

            button:active {
                transform: translateY(0);
            }

            button.active {
                background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            }

            #legend {
                position: absolute;
                bottom: 20px;
                right: 20px;
                background: rgba(0, 0, 0, 0.75);
                backdrop-filter: blur(15px);
                padding: 20px;
                border-radius: 20px;
                z-index: 100;
                box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
                border: 1px solid rgba(255, 255, 255, 0.1);
            }

            .legend-item {
                display: flex;
                align-items: center;
                margin: 10px 0;
                font-size: 14px;
            }

            .legend-color {
                width: 20px;
                height: 20px;
                border-radius: 50%;
                margin-right: 10px;
                box-shadow: 0 0 15px currentColor;
            }

            #time-display {
                font-size: 56px;
                font-weight: bold;
                text-align: center;
                margin-bottom: 15px;
                text-shadow: 0 0 30px rgba(255, 255, 255, 0.8);
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
            }
        </style>
    </head>
    <body>
        <div id="container"></div>

        <div id="info-panel">
            <h2>💰 Economic Metrics</h2>
            <div id="time-display">Day 0</div>

            <div class="metric" style="border-left-color: #4ade80">
                <div class="metric-label">Total Wealth</div>
                <div class="metric-value" style="color: #4ade80">$12,500</div>
            </div>

            <div class="metric" style="border-left-color: #fbbf24">
                <div class="metric-label">Market Price</div>
                <div class="metric-value" style="color: #fbbf24">$10.00</div>
            </div>

            <div class="metric" style="border-left-color: #f87171">
                <div class="metric-label">Inequality (Gini)</div>
                <div class="metric-value" style="color: #f87171">0.25</div>
            </div>
        </div>

        <div id="stats-panel">
            <h3 style="margin-bottom: 15px; font-size: 18px">📊 Population</h3>
            <div class="stat-item">
                <span class="stat-label">Consumers</span>
                <span class="stat-value">50</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Producers</span>
                <span class="stat-value">10</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Avg Consumer Wealth</span>
                <span class="stat-value" id="avg-wealth">$250</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Total Production</span>
                <span class="stat-value" id="production">15,000</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Total Demand</span>
                <span class="stat-value" id="demand">12,500</span>
            </div>
        </div>

        <div id="legend">
            <h4 style="margin-bottom: 12px; font-size: 16px">🎨 Legend</h4>
            <div class="legend-item">
                <div class="legend-color" style="background: #60a5fa"></div>
                <span>Consumers (wealth size)</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #f59e0b"></div>
                <span>Producers (capital size)</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #4ade80"></div>
                <span>Money flow</span>
            </div>
        </div>

        <div id="controls">
            <button id="pauseBtn">⏸ Pause</button>
            <button id="resetBtn">🔄 Reset</button>
            <button id="speedBtn">⏩ 2x Speed</button>
        </div>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
        <script>
            // Economic simulation parameters
            const N_CONSUMERS = 50;
            const N_PRODUCERS = 10;

            // Three.js setup
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a1128);
            scene.fog = new THREE.FogExp2(0x0a1128, 0.015);

            const camera = new THREE.PerspectiveCamera(
                60,
                window.innerWidth / window.innerHeight,
                0.1,
                1000
            );
            camera.position.set(0, 50, 60);
            camera.lookAt(0, 0, 0);

            const renderer = new THREE.WebGLRenderer({
                antialias: true,
                alpha: true,
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document
                .getElementById("container")
                .appendChild(renderer.domElement);

            // Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
            scene.add(ambientLight);

            const mainLight = new THREE.DirectionalLight(0xffffff, 0.8);
            mainLight.position.set(20, 40, 20);
            mainLight.castShadow = true;
            mainLight.shadow.mapSize.width = 2048;
            mainLight.shadow.mapSize.height = 2048;
            scene.add(mainLight);

            const blueLight = new THREE.PointLight(0x667eea, 1.5, 100);
            blueLight.position.set(-30, 20, -30);
            scene.add(blueLight);

            const purpleLight = new THREE.PointLight(0x764ba2, 1.5, 100);
            purpleLight.position.set(30, 20, 30);
            scene.add(purpleLight);

            // Ground plane
            const groundGeometry = new THREE.CircleGeometry(50, 64);
            const groundMaterial = new THREE.MeshStandardMaterial({
                color: 0x1a2332,
                roughness: 0.8,
                metalness: 0.3,
            });
            const ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);

            // Grid circles
            for (let i = 1; i <= 5; i++) {
                const ringGeometry = new THREE.RingGeometry(
                    i * 8,
                    i * 8 + 0.1,
                    64
                );
                const ringMaterial = new THREE.MeshBasicMaterial({
                    color: 0x667eea,
                    transparent: true,
                    opacity: 0.2,
                    side: THREE.DoubleSide,
                });
                const ring = new THREE.Mesh(ringGeometry, ringMaterial);
                ring.rotation.x = -Math.PI / 2;
                ring.position.y = 0.01;
                scene.add(ring);
            }

            // Consumer class
            class Consumer {
                constructor(id) {
                    this.id = id;
                    this.wealth = 100 + Math.random() * 400;
                    this.consumptionRate = 0.6 + Math.random() * 0.3;

                    const size = Math.log(this.wealth) * 0.15;
                    const geometry = new THREE.SphereGeometry(size, 16, 16);
                    const material = new THREE.MeshStandardMaterial({
                        color: 0x60a5fa,
                        emissive: 0x60a5fa,
                        emissiveIntensity: 0.4,
                        roughness: 0.3,
                        metalness: 0.7,
                    });

                    this.mesh = new THREE.Mesh(geometry, material);

                    const angle = (id / N_CONSUMERS) * Math.PI * 2;
                    const radius = 25 + Math.random() * 10;
                    this.mesh.position.set(
                        Math.cos(angle) * radius,
                        size,
                        Math.sin(angle) * radius
                    );

                    this.mesh.castShadow = true;
                    this.mesh.receiveShadow = true;
                    scene.add(this.mesh);

                    // Glow
                    const glowGeometry = new THREE.SphereGeometry(
                        size * 1.5,
                        16,
                        16
                    );
                    const glowMaterial = new THREE.MeshBasicMaterial({
                        color: 0x60a5fa,
                        transparent: true,
                        opacity: 0.2,
                    });
                    this.glow = new THREE.Mesh(glowGeometry, glowMaterial);
                    this.mesh.add(this.glow);
                }

                updateSize() {
                    const size = Math.log(Math.max(this.wealth, 10)) * 0.15;
                    this.mesh.scale.set(1, 1, 1);
                    this.mesh.geometry = new THREE.SphereGeometry(size, 16, 16);
                    this.mesh.position.y = size;

                    const intensity = Math.min(this.wealth / 500, 1);
                    this.mesh.material.emissiveIntensity =
                        0.2 + intensity * 0.3;
                }
            }

            // Producer class
            class Producer {
                constructor(id) {
                    this.id = id;
                    this.capital = 1000 + Math.random() * 2000;
                    this.productivity = 0.5 + Math.random() * 1;

                    const size = Math.log(this.capital) * 0.2;
                    const geometry = new THREE.CylinderGeometry(
                        size,
                        size * 1.5,
                        size * 2,
                        8
                    );
                    const material = new THREE.MeshStandardMaterial({
                        color: 0xf59e0b,
                        emissive: 0xf59e0b,
                        emissiveIntensity: 0.5,
                        roughness: 0.2,
                        metalness: 0.8,
                    });

                    this.mesh = new THREE.Mesh(geometry, material);

                    const angle = (id / N_PRODUCERS) * Math.PI * 2;
                    const radius = 8;
                    this.mesh.position.set(
                        Math.cos(angle) * radius,
                        size,
                        Math.sin(angle) * radius
                    );

                    this.mesh.castShadow = true;
                    this.mesh.receiveShadow = true;
                    scene.add(this.mesh);

                    // Glow ring
                    const ringGeometry = new THREE.TorusGeometry(
                        size * 2,
                        size * 0.3,
                        8,
                        16
                    );
                    const ringMaterial = new THREE.MeshBasicMaterial({
                        color: 0xf59e0b,
                        transparent: true,
                        opacity: 0.3,
                    });
                    this.ring = new THREE.Mesh(ringGeometry, ringMaterial);
                    this.ring.rotation.x = Math.PI / 2;
                    this.mesh.add(this.ring);
                }

                updateSize() {
                    const size = Math.log(Math.max(this.capital, 100)) * 0.2;
                    this.mesh.scale.set(1, 1, 1);
                    this.mesh.geometry = new THREE.CylinderGeometry(
                        size,
                        size * 1.5,
                        size * 2,
                        8
                    );
                    this.mesh.position.y = size;
                }
            }

            // Initialize economy
            let consumers = [];
            let producers = [];
            let day = 0;
            let price = 10;
            let paused = false;
            let speed = 1;
            let transactionLines = [];

            function initEconomy() {
                consumers.forEach((c) => scene.remove(c.mesh));
                producers.forEach((p) => scene.remove(p.mesh));
                transactionLines.forEach((l) => scene.remove(l));

                consumers = [];
                producers = [];
                transactionLines = [];
                day = 0;
                price = 10;

                for (let i = 0; i < N_CONSUMERS; i++) {
                    consumers.push(new Consumer(i));
                }

                for (let i = 0; i < N_PRODUCERS; i++) {
                    producers.push(new Producer(i));
                }

                updateDisplay();
            }

            // Create transaction visualization
            function createTransactionLine(from, to, amount) {
                const points = [];
                const start = from.position.clone();
                const end = to.position.clone();
                const mid = new THREE.Vector3(
                    (start.x + end.x) / 2,
                    Math.max(start.y, end.y) + 5 + Math.random() * 3,
                    (start.z + end.z) / 2
                );

                for (let i = 0; i <= 20; i++) {
                    const t = i / 20;
                    const t2 = t * t;
                    const t3 = 1 - t;
                    const t4 = t3 * t3;

                    const x = t4 * start.x + 2 * t3 * t * mid.x + t2 * end.x;
                    const y = t4 * start.y + 2 * t3 * t * mid.y + t2 * end.y;
                    const z = t4 * start.z + 2 * t3 * t * mid.z + t2 * end.z;

                    points.push(new THREE.Vector3(x, y, z));
                }

                const geometry = new THREE.BufferGeometry().setFromPoints(
                    points
                );
                const material = new THREE.LineBasicMaterial({
                    color: 0x4ade80,
                    transparent: true,
                    opacity: 0.6,
                    linewidth: 2,
                });

                const line = new THREE.Line(geometry, material);
                scene.add(line);
                transactionLines.push(line);

                // Fade out and remove
                setTimeout(() => {
                    let opacity = 0.6;
                    const fadeInterval = setInterval(() => {
                        opacity -= 0.05;
                        line.material.opacity = opacity;
                        if (opacity <= 0) {
                            scene.remove(line);
                            const index = transactionLines.indexOf(line);
                            if (index > -1) transactionLines.splice(index, 1);
                            clearInterval(fadeInterval);
                        }
                    }, 50);
                }, 500);
            }

            // Economic simulation step
            function simulateEconomy() {
                if (paused) return;

                day++;

                // Calculate supply and demand
                const totalDemand = consumers.reduce(
                    (sum, c) => sum + (c.wealth * c.consumptionRate) / price,
                    0
                );
                const totalSupply = producers.reduce(
                    (sum, p) => sum + p.capital * p.productivity,
                    0
                );

                // Adjust price
                if (totalDemand > totalSupply * 1.1) {
                    price *= 1.02;
                } else if (totalDemand < totalSupply * 0.9) {
                    price *= 0.98;
                }
                price = Math.max(1, Math.min(50, price));

                // Consumers spend
                let totalSpending = 0;
                consumers.forEach((consumer) => {
                    const spending = Math.min(
                        consumer.wealth * consumer.consumptionRate,
                        consumer.wealth
                    );
                    consumer.wealth -= spending;
                    totalSpending += spending;

                    // Visual transaction to random producer
                    if (Math.random() < 0.1 && spending > 0) {
                        const producer =
                            producers[
                                Math.floor(Math.random() * producers.length)
                            ];
                        createTransactionLine(
                            consumer.mesh,
                            producer.mesh,
                            spending
                        );
                    }
                });

                // Producers receive revenue and grow
                producers.forEach((producer) => {
                    const marketShare =
                        (producer.capital * producer.productivity) /
                        Math.max(totalSupply, 1);
                    const revenue = totalSpending * marketShare;
                    producer.capital += revenue * 0.1;
                    producer.updateSize();
                });

                // Distribute wages back to consumers
                const totalWages = totalSpending * 0.7;
                const wagePerConsumer = totalWages / consumers.length;

                consumers.forEach((consumer) => {
                    consumer.wealth += wagePerConsumer;
                    consumer.wealth += (Math.random() - 0.5) * 10;
                    consumer.wealth = Math.max(10, consumer.wealth);
                    consumer.updateSize();
                });

                updateDisplay();
            }

            function calculateGini() {
                const wealths = consumers
                    .map((c) => c.wealth)
                    .sort((a, b) => a - b);
                const n = wealths.length;
                const cumWealth = wealths.reduce(
                    (sum, w, i) => sum + (i + 1) * w,
                    0
                );
                return (
                    (2 * cumWealth) / (n * wealths.reduce((a, b) => a + b, 0)) -
                    (n + 1) / n
                );
            }

            function updateDisplay() {
                const totalWealth = consumers.reduce(
                    (sum, c) => sum + c.wealth,
                    0
                );
                const avgWealth = totalWealth / consumers.length;
                const totalProduction = producers.reduce(
                    (sum, p) => sum + p.capital * p.productivity,
                    0
                );
                const totalDemand = consumers.reduce(
                    (sum, c) => sum + (c.wealth * c.consumptionRate) / price,
                    0
                );
                const gini = calculateGini();

                document.getElementById(
                    "time-display"
                ).textContent = `Day ${day}`;
                document.querySelector(
                    '.metric-value[style*="4ade80"]'
                ).textContent = `$${Math.round(totalWealth).toLocaleString()}`;
                document.querySelector(
                    '.metric-value[style*="fbbf24"]'
                ).textContent = `$${price.toFixed(2)}`;
                document.querySelector(
                    '.metric-value[style*="f87171"]'
                ).textContent = gini.toFixed(3);

                document.getElementById(
                    "avg-wealth"
                ).textContent = `$${Math.round(avgWealth)}`;
                document.getElementById("production").textContent =
                    Math.round(totalProduction).toLocaleString();
                document.getElementById("demand").textContent =
                    Math.round(totalDemand).toLocaleString();
            }

            // Animation loop
            let frameCount = 0;
            function animate() {
                requestAnimationFrame(animate);

                frameCount++;
                if (frameCount % (60 / speed) === 0) {
                    simulateEconomy();
                }

                // Rotate camera
                const time = Date.now() * 0.0002;
                camera.position.x = Math.sin(time) * 60;
                camera.position.z = Math.cos(time) * 60;
                camera.lookAt(0, 0, 0);

                // Animate glows
                consumers.forEach((c) => {
                    if (c.glow) {
                        c.glow.rotation.y += 0.02;
                    }
                });

                producers.forEach((p) => {
                    if (p.ring) {
                        p.ring.rotation.z += 0.03;
                    }
                });

                renderer.render(scene, camera);
            }

            // Controls
            document
                .getElementById("pauseBtn")
                .addEventListener("click", function () {
                    paused = !paused;
                    this.textContent = paused ? "▶ Play" : "⏸ Pause";
                });

            document
                .getElementById("resetBtn")
                .addEventListener("click", function () {
                    initEconomy();
                });

            document
                .getElementById("speedBtn")
                .addEventListener("click", function () {
                    speed = speed === 1 ? 2 : speed === 2 ? 4 : 1;
                    this.textContent =
                        speed === 1
                            ? "⏩ 2x Speed"
                            : speed === 2
                            ? "⏩ 4x Speed"
                            : "⏩ 1x Speed";
                });

            window.addEventListener("resize", function () {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            // Start
            initEconomy();
            animate();
        </script>
    </body>
</html>
